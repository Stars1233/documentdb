name: Build and push gateway images

on:
  workflow_call:
    inputs:
      push_images:
        description: 'if true, push images to GHCR (default: false) otherwise only build'
        default: false
        required: false
        type: boolean
  workflow_dispatch:
    inputs:
      push_images:
        description: 'if true, push images to GHCR (default: false) otherwise only build'
        default: false
        required: false
        type: boolean

  push:
    branches:
      - 'main'
      - 'release/**'
    paths-ignore:
      - '.devcontainer/**'
      - '*.md'

permissions:
  packages: write
  contents: read
  id-token: write

env:
  IMAGE_NAME: documentdb-local
  IMAGE_TAG: ${{ github.run_id }}-$(date +'%Y-%m-%d')

jobs:
  build-and-push:
    name: Build and Push Images
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            base_arch: AMD64
            runner: ubuntu-22.04
          - arch: arm64
            base_arch: ARM64
            runner: ubuntu-22.04-arm
        pg_version:
          - 15
          - 16
          - 17
          - 18
    runs-on: ${{ matrix.runner }}
    outputs:
      documentdb_version: ${{ steps.extract_version.outputs.documentdb_version }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
    - name: Extract and Format Default Version
      id: extract_version
      run: |
        DOCUMENTDB_VERSION=$(grep -E "^default_version" pg_documentdb_core/documentdb_core.control | sed -E "s/.*'([0-9]+\.[0-9]+-[0-9]+)'.*/\1/")
        DOCUMENTDB_VERSION=$(echo $DOCUMENTDB_VERSION | sed "s/-/./g")
        echo "Extracted Version: $DOCUMENTDB_VERSION"
        echo "documentdb_version=$DOCUMENTDB_VERSION" >> $GITHUB_OUTPUT
    - name: Build Debian Package
      run: |
        ./packaging/build_packages.sh --os deb13 --pg ${{ matrix.pg_version }} --output-dir downloaded-artifacts
        ls -R downloaded-artifacts
    - name: Login to GHCR
      run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
    - name: Build ${{ matrix.arch }} Image
      run: |
        TAG=${{ env.IMAGE_TAG }}-pg${{ matrix.pg_version }}-${{ matrix.arch }}
        docker build \
          --platform linux/${{ matrix.arch }} \
          --build-arg BASE_IMAGE=debian:trixie-slim \
          --build-arg POSTGRES_VERSION=${{ matrix.pg_version }} \
          --build-arg DEB_PACKAGE_REL_PATH=downloaded-artifacts/$(ls downloaded-artifacts | grep -v 'dbgsym')  \
          -t ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}:$TAG \
          -f packaging/gateway/docker/Dockerfile_documentdb_local .
    - name: Smoke test ${{ matrix.arch }} Image
      run: |
        set -euo pipefail
        TAG=${{ env.IMAGE_TAG }}-pg${{ matrix.pg_version }}-${{ matrix.arch }}
        IMAGE=ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}:$TAG
        CONTAINER_NAME=documentdb-local-smoke-pg${{ matrix.pg_version }}-${{ matrix.arch }}
        SMOKE_DIR=$(mktemp -d)
        chmod 755 "$SMOKE_DIR"
        dump_logs=true
        cleanup() {
          if [ "$dump_logs" = "true" ]; then
            docker logs "$CONTAINER_NAME" || true
          fi
          docker rm -f "$CONTAINER_NAME" >/dev/null 2>&1 || true
          rm -rf "$SMOKE_DIR"
        }
        wait_for_log() {
          local pattern="$1"
          local timeout_seconds="$2"
          local waited=0

          while ! docker logs "$CONTAINER_NAME" 2>&1 | grep -Fq "$pattern"; do
            running=$(docker inspect -f '{{.State.Running}}' "$CONTAINER_NAME" 2>/dev/null || echo false)
            if [ "$running" != "true" ]; then
              echo "Container exited before log pattern appeared: $pattern" >&2
              return 1
            fi

            sleep 2
            waited=$((waited + 2))
            if [ "$waited" -ge "$timeout_seconds" ]; then
              echo "Timed out waiting for log pattern: $pattern" >&2
              return 1
            fi
          done
        }
        trap cleanup EXIT

        cat > "$SMOKE_DIR/001-gateway-smoke-init.js" <<'EOF'
        const smokeDb = db.getSiblingDB('gateway_smoke');
        smokeDb.image_smoke.deleteMany({});
        smokeDb.image_smoke.insertOne({ name: 'documentdb-local-smoke', ok: true });
        EOF

        docker run -d --name "$CONTAINER_NAME" --mount "type=bind,source=$SMOKE_DIR,target=/init_doc_db.d,readonly" "$IMAGE" --username docdb_admin --password 123456 --init-data-path /init_doc_db.d

        wait_for_log "=== DocumentDB is ready ===" 240
        wait_for_log "Custom data initialization completed." 180

        docker exec "$CONTAINER_NAME" mongosh "localhost:10260" -u docdb_admin -p 123456 --authenticationMechanism SCRAM-SHA-256 --tls --tlsAllowInvalidCertificates --quiet --eval 'const count = db.getSiblingDB("gateway_smoke").image_smoke.countDocuments({ name: "documentdb-local-smoke", ok: true }); if (count !== 1) { print(`expected 1 document, found ${count}`); quit(1); }'

        dump_logs=false
    - name: Push ${{ matrix.arch }} Image
      if: github.event.inputs.push_images == 'true' || startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
      run: |
        TAG=${{ env.IMAGE_TAG }}-pg${{ matrix.pg_version }}-${{ matrix.arch }}
        echo "Pushing image ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}:$TAG"
        docker push ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}:$TAG
    
  create-manifest:
    name: Create, Push, Sign & Verify Manifest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        pg_version:
          - 15
          - 16
          - 17
          - 18
    runs-on: ubuntu-22.04
    needs: build-and-push
    steps:
    - name: Login to GHCR
      run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
    - name: Show version
      run: echo "Using DOCUMENTDB_VERSION=${{ needs.build-and-push.outputs.documentdb_version }}"
    - name: Set Default Values
      run: |
        echo "MANIFEST_TAG=pg${{ matrix.pg_version }}-${{ needs.build-and-push.outputs.documentdb_version }}" >> $GITHUB_ENV
    - name: Create & push manifest for all PG versions
      run: |
        docker manifest create ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}:${{ env.MANIFEST_TAG }} \
          --amend ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}-pg${{ matrix.pg_version }}-amd64 \
          --amend ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}-pg${{ matrix.pg_version }}-arm64
        docker manifest push ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}:${{ env.MANIFEST_TAG }}
    - name: Install cosign
      uses: sigstore/cosign-installer@main
    - name: Sign manifest (keyless)
      run: |
        DIGEST=$(docker buildx imagetools inspect ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}:${{ env.MANIFEST_TAG }} \
          | awk '/^Digest:/ { print $2 }')
        echo "Signing manifest-list@${DIGEST}"
        cosign sign ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}@${DIGEST} -y
    - name: Verify manifest signature (keyless)
      run: |
        DIGEST=$(docker buildx imagetools inspect ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}:${{ env.MANIFEST_TAG }} \
          | awk '/^Digest:/ { print $2 }')
        cosign verify \
          --certificate-identity-regexp "https://github.com/${{ github.repository }}/.github/workflows/build_gateway.yml@${{ github.ref }}" \
          --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
          ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}@${DIGEST}

  create-manifest-latest:  
    name: Create & push 'latest' manifest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04
    needs: build-and-push
    steps:
    - name: Login to GHCR
      run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
    - name: Set Default Values
      run: |
        echo "MANIFEST_TAG=latest" >> $GITHUB_ENV
    - name: Create and Push Manifest
      run: |
        # Keep the floating latest tag on PG17 for compatibility; PG18 is published via explicit pg18-* tags.
        docker manifest create ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}:${{ env.MANIFEST_TAG }} \
          --amend ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}-pg17-amd64 \
          --amend ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}-pg17-arm64
        docker manifest push ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}:${{ env.MANIFEST_TAG }}
    - name: Install cosign
      uses: sigstore/cosign-installer@main
    - name: Sign manifest (keyless)
      run: |
        DIGEST=$(docker buildx imagetools inspect ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}:${{ env.MANIFEST_TAG }} \
          | awk '/^Digest:/ { print $2 }')
        echo "Signing manifest-list@${DIGEST}"
        cosign sign ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}@${DIGEST} -y
    - name: Verify manifest signature (keyless)
      run: |
        DIGEST=$(docker buildx imagetools inspect ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}:${{ env.MANIFEST_TAG }} \
          | awk '/^Digest:/ { print $2 }')
        cosign verify \
          --certificate-identity-regexp "https://github.com/${{ github.repository }}/.github/workflows/build_gateway.yml@${{ github.ref }}" \
          --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
          ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}@${DIGEST}
