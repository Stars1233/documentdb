
documentdb_core.bsonUseEJson = on
documentdb.blockedRolePrefixList = 'documentdb,pg'

documentdb.enableIndexOnlyScan = 'true'
documentdb.enableContinuationFastBitmapLookup = 'true'

documentdb.indexBuildsScheduledOnBgWorker = off

# Disable local retry table for existing tests for compatability, dedicated test enables it.
# TODO: We need to clean all the tests and enable this by default, and then it can be removed
documentdb.enableLocalRetryTable = 'false'