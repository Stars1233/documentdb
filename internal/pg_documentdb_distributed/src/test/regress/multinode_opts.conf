# Multinode-only test configuration.
#
# Includes the shared regression options and additionally enables the dynamic
# cursor / local-execution GUCs. These must be active on every node
# (coordinator + workers) so that remote cursor drain queries resolve the
# expected scan types during multinode tests.
#
# They are intentionally kept out of regression_opts.conf so that single-node
# suites (e.g. basic_schedule) are not forced onto the dynamic cursor path.
# Dedicated dynamic cursor tests still SET these GUCs locally as well.
include 'regression_opts.conf'

documentdb.enableDynamicCursors = 'on'
documentdb.enableIndexOnlyScanForFindProject = 'on'