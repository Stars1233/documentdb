[config]
default_to_workspace = false

[tasks.format-check]
command = "cargo"
args = ["fmt", "--all", "--check"]

[tasks.clippy]
command = "cargo"
args = ["clippy", "--workspace", "--all-targets", "--all-features", "--frozen", "--", "-D", "warnings"]

[tasks.deny]
command = "cargo"
args = ["deny", "check", "bans"]

[tasks.notice]
clear = true
script_runner = "@shell"
script = '''
"$CARGO_MAKE_WORKING_DIRECTORY/../scripts/generate_notice.sh" \
  -d "$CARGO_MAKE_WORKING_DIRECTORY/documentdb_gateway_core" \
  -o "$CARGO_MAKE_WORKING_DIRECTORY/NOTICE"
'''

[tasks.notice-frozen]
clear = true
script_runner = "@shell"
script = '''
"$CARGO_MAKE_WORKING_DIRECTORY/../scripts/generate_notice.sh" \
  -d "$CARGO_MAKE_WORKING_DIRECTORY/documentdb_gateway_core" \
  -o "$CARGO_MAKE_WORKING_DIRECTORY/NOTICE" \
  -f
'''

[tasks.check-notice]
clear = true
script_runner = "@shell"
script = '''
TEMP_NOTICE_FILE="$(mktemp)"
trap 'rm -f "$TEMP_NOTICE_FILE"' EXIT

"$CARGO_MAKE_WORKING_DIRECTORY/../scripts/generate_notice.sh" \
  -d "$CARGO_MAKE_WORKING_DIRECTORY/documentdb_gateway_core" \
  -o "$TEMP_NOTICE_FILE" \
  -f

if ! cmp -s "$CARGO_MAKE_WORKING_DIRECTORY/NOTICE" "$TEMP_NOTICE_FILE"; then
  echo "NOTICE is out of date. Run 'cargo make notice' in pg_documentdb_gw to regenerate it."
  diff -u "$CARGO_MAKE_WORKING_DIRECTORY/NOTICE" "$TEMP_NOTICE_FILE" || true
  exit 1
fi
'''

[tasks.lint]
dependencies = ["format-check", "clippy", "deny", "check-notice"]

[tasks.build]
dependencies = ["notice"]
command = "cargo"
args = ["build", "--workspace"]

[tasks.release-build]
dependencies = ["notice-frozen"]
command = "cargo"
args = ["build", "--frozen", "--profile=release-with-symbols"]

[tasks.test]
clear = true
script_runner = "@shell"
script = '''
bash ../scripts/run_rust_tests_with_junit.sh "$CARGO_MAKE_WORKING_DIRECTORY"
'''

[tasks.dev]
dependencies = ["build", "lint"]

[tasks.release]
dependencies = ["release-build", "lint"]
