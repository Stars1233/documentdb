# DocumentDB PR-gate allowlist.
#
# Schema versions:
#   1 - Flat list of pytest node IDs (still accepted; treated as "all engines")
#   2 - List of either bare strings (= all engines) OR
#       { id: <node-id>, engines: [<engine-name>, ...] } dicts for the
#       rare case where a test must be scoped to a subset of engines.
#       Example:
#         - id: compatibility/tests/foo/test_bar.py::test_baz
#           engines: [pgmongo]
#       Almost every entry should stay a bare string. See the README section
#       "Adding an engine-scoped test" before reaching for the dict form.
#
# Generated from the intersection of passing tests across multiple scheduled
# daily full-suite runs (non-flaky passers only). Tests from engine-crashing
# files (setUnion_core, setUnion_type_dedup, stages_window,
# planCacheStats_type_errors) are excluded and --ignore'd in the workflow.
